name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger a build manually from GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioTranscriber-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Creates / updates a "latest" GitHub Release with the APK attached
      # Anyone can download it from:  github.com/<you>/AudioTranscriber/releases/latest
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: |
            Automatically built from the latest code on `main`.

            ## How to install on your phone
            1. Download **app-debug.apk** below
            2. On your phone: Settings → Security → **Install unknown apps** → allow your browser
            3. Open the downloaded APK and tap Install
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
